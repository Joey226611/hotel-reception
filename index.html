<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Hotel Reception Cloud</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    margin:0;
}
h1{margin-top:10px}

.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    padding:20px;
}
.room{
    background:#1e293b;
    padding:15px;
    border-radius:15px;
}
.free{ background:#065f46; }
.busy{ background:#7f1d1d; }

input{
    padding:6px;
    margin:3px;
    border-radius:6px;
    border:none;
    width:90%;
}
button{
    padding:7px;
    margin-top:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    width:95%;
}
</style>
</head>

<body>

<h1>Hotel Reception</h1>
<div class="grid" id="rooms"></div>

<script>
// 🔑 Firebase config
var firebaseConfig = {
  apiKey: "PASTE",
  authDomain: "PASTE",
  databaseURL: "PASTE",
  projectId: "PASTE",
  storageBucket: "PASTE",
  messagingSenderId: "PASTE",
  appId: "PASTE"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// 💎 Kamers en prijzen
const roomNumbers=[101,102,103,104,105,106,107,108,109,201,202,203,204];
const roomsDiv=document.getElementById("rooms");

function getRoomPrice(room){
    if(room>=101 && room<=104) return 300;
    if(room==105) return 400;
    if(room>=106 && room<=109) return 300;
    if(room>=201 && room<=204) return 600;
}

// 💻 Kamer layout
roomNumbers.forEach(room=>{
    let price=getRoomPrice(room);

    let div=document.createElement("div");
    div.className="room free";
    div.id="room"+room;
    div.innerHTML=`
        <h3>Room ${room}</h3>
        <p class="info">Free<br>€${price} p.p / night</p>

        <input id="name${room}" placeholder="Guest name">
        <input id="nights${room}" placeholder="Nights">
        <input id="persons${room}" placeholder="Persons">

        <button onclick="checkIn(${room})">Check In</button>
        <button onclick="checkOut(${room})">Check Out</button>
        <button onclick="printReceipt(${room})">Print Receipt</button>
    `;
    roomsDiv.appendChild(div);
});

// 🔄 Realtime sync
db.ref("rooms").on("value", snap=>{
    let data=snap.val();
    if(!data) return;
    for(let room in data){
        updateRoomUI(room,data[room]);
    }
});

// ✅ Check-in
function checkIn(room){
    let name=(document.getElementById("name"+room).value||"").trim();
    let nights=parseInt(document.getElementById("nights"+room).value||0);
    let persons=parseInt(document.getElementById("persons"+room).value||0);

    if(!name || nights<=0 || persons<=0){
        alert("Fill all fields!");
        return;
    }

    let total=persons*nights*getRoomPrice(room);

    db.ref("rooms/"+room).set({
        name:name,
        nights:nights,
        persons:persons,
        total:total,
        date:new Date().toLocaleString()
    });
}

// ✅ Check-out
function checkOut(room){
    db.ref("rooms/"+room).remove();
    location.reload();
}

// 🔧 Update UI
function updateRoomUI(room,data){
    let div=document.getElementById("room"+room);
    div.classList.remove("free");
    div.classList.add("busy");

    let price=getRoomPrice(room);

    div.querySelector(".info").innerHTML=
        `<b>${data.name}</b><br>
        Persons: ${data.persons}<br>
        Nights: ${data.nights}<br>
        Price p.p: €${price}<br>
        <b>Total €${data.total}</b>`;
}

// 🧾 Print Receipt
function printReceipt(room){
    db.ref("rooms/"+room).once("value").then(snap=>{
        if(!snap.exists()){
            alert("Room is empty!");
            return;
        }

        let data=snap.val();
        let price=getRoomPrice(room);

        let receipt=window.open("", "", "width=400,height=600");
        receipt.document.write(`
            <h2>Hotel Receipt</h2>
            <hr>
            <p><b>Room:</b> ${room}</p>
            <p><b>Name:</b> ${data.name}</p>
            <p><b>Persons:</b> ${data.persons}</p>
            <p><b>Nights:</b> ${data.nights}</p>
            <p><b>Price p.p:</b> €${price}</p>
            <h3>Total: €${data.total}</h3>
            <p>${data.date}</p>
        `);
        receipt.print();
    });
}
</script>

</body>
</html>
