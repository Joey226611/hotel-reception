<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Hotel Reception Pro</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{font-family:Segoe UI;background:#0f172a;color:white;margin:0}
h1{text-align:center;color:#fcd34d;margin:15px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;padding:20px}

.room{
    border-radius:18px;padding:15px;
    box-shadow:0 0 15px rgba(0,0,0,.5);
    transition:.3s;
}
.room:hover{transform:translateY(-5px)}

.free{background:#065f46}
.occupied{background:#7f1d1d}
.dirty{background:#ff0000}
.cleaning{background:#2563eb}
.cleaned{background:#f59e0b}

input{width:90%;padding:7px;margin:3px;border:none;border-radius:8px}
button{width:95%;padding:8px;margin:4px;border:none;border-radius:10px;font-weight:bold;cursor:pointer}
.receipt{background:#111827;color:#fff}
</style>
</head>

<body>
<h1>Hotel Reception Dashboard</h1>
<div class="grid" id="rooms"></div>

<script>
// 🔑 FIREBASE CONFIG
 var firebaseConfig = {
  apiKey: "AIzaSyBeidcBbNTGKb_GtXEad20Xpug1Se9e9x0",
  authDomain: "hotelreception.firebaseapp.com",
 databaseURL: "https://hotelreception-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "hotelreception",
  storageBucket: "hotelreception.firebasestorage.app",
  messagingSenderId: "162982201655",
  appId: "1:162982201655:web:e7730850e09d3670d032b2"
};

firebase.initializeApp(firebaseConfig);
var db=firebase.database();

// kamers
const rooms=[101,102,103,104,105,106,107,108,109,201,202,203,204];
const grid=document.getElementById("rooms");

function price(room){
 if(room>=101&&room<=104) return 300;
 if(room==105) return 400;
 if(room>=106&&room<=109) return 300;
 if(room>=201&&room<=204) return 600;
}

// cards maken
rooms.forEach(r=>{
 let div=document.createElement("div");
 div.className="room free";
 div.id="room"+r;
 div.innerHTML=`
 <h3>Room ${r}</h3>
 <p class="info">Free<br>€${price(r)} p.p / night</p>
 <input id="name${r}" placeholder="Guest name">
 <input id="nights${r}" placeholder="Nights">
 <input id="persons${r}" placeholder="Persons">

 <button onclick="checkIn(${r})">Check In</button>
 <button onclick="checkOut(${r})">Check Out</button>
 <button onclick="janitorBusy(${r})">Janitor Busy</button>
 <button onclick="cleanDone(${r})">Cleaning Done</button>
 <button onclick="releaseRoom(${r})">Release Room</button>
 <button class="receipt" onclick="receipt(${r})">Print Receipt</button>
 `;
 grid.appendChild(div);
});

// realtime auto update
db.ref("rooms").on("value",snap=>{
 let data=snap.val();
 rooms.forEach(r=>{
  if(!data||!data[r]) setFree(r);
  else updateRoom(r,data[r]);
 });
});

// CHECK IN
function checkIn(room){
 let name=(document.getElementById("name"+room).value||"").trim();
 let nights=parseInt(document.getElementById("nights"+room).value||0);
 let persons=parseInt(document.getElementById("persons"+room).value||0);
 if(!name||nights<=0||persons<=0){alert("Fill fields");return;}

 db.ref("rooms/"+room).set({
  name:name,nights:nights,persons:persons,
  total:nights*persons*price(room),
  date:new Date().toLocaleString(),
  status:"occupied"
 });
}

// CHECK OUT → DIRTY
function checkOut(room){ db.ref("rooms/"+room+"/status").set("dirty"); }

// JANITOR BUSY → BLUE
function janitorBusy(room){ db.ref("rooms/"+room+"/status").set("cleaning"); }

// CLEAN DONE → ORANGE
function cleanDone(room){ db.ref("rooms/"+room+"/status").set("cleaned"); }

// RELEASE ROOM → GREEN
function releaseRoom(room){ db.ref("rooms/"+room).remove(); }

// UI updates
function setFree(room){
 let div=document.getElementById("room"+room);
 div.className="room free";
 div.querySelector(".info").innerHTML=`Free<br>€${price(room)} p.p / night`;
}

function updateRoom(room,data){
 let div=document.getElementById("room"+room);

 if(data.status=="occupied"){
  div.className="room occupied";
  div.querySelector(".info").innerHTML=
  `<b>${data.name}</b><br>
  Persons:${data.persons}<br>
  Nights:${data.nights}<br>
  Total €${data.total}`;
 }

 if(data.status=="dirty"){
  div.className="room dirty";
  div.querySelector(".info").innerHTML="<b>Needs Cleaning</b>";
 }

 if(data.status=="cleaning"){
  div.className="room cleaning";
  div.querySelector(".info").innerHTML="<b>Janitor Busy</b>";
 }

 if(data.status=="cleaned"){
  div.className="room cleaned";
  div.querySelector(".info").innerHTML="<b>Cleaned ✔</b>";
 }
}

// RECEIPT
function receipt(room){
 db.ref("rooms/"+room).once("value").then(s=>{
  if(!s.exists()){alert("Empty");return;}
  let d=s.val();
  let w=window.open("","","width=400,height=600");
  w.document.write(`
   <h2>Hotel Receipt</h2>
   Room ${room}<hr>
   Name: ${d.name}<br>
   Persons: ${d.persons}<br>
   Nights: ${d.nights}<br>
   Price p.p: €${price(room)}<br>
   <h3>Total €${d.total}</h3>
   ${d.date}
  `);
  w.print();
 });
}
</script>
</body>
</html>
