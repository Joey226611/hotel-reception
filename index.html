<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hotel Reception</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}
h1{margin-top:10px}

.grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:15px;
    padding:20px;
}

.room{
    background:#1e293b;
    padding:15px;
    border-radius:15px;
}

.free{ background:#065f46; }
.busy{ background:#7f1d1d; }

input{
    padding:8px;
    margin:5px;
    border-radius:8px;
    border:none;
}
button{
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>Hotel Reception Dashboard</h1>

<div>
<input id="name" placeholder="Guest name">
<input id="nights" placeholder="Nights">
<input id="persons" placeholder="Persons">
<input id="price" placeholder="Total price €">
</div>

<div class="grid" id="rooms"></div>

<script>
// 🔥 PLAK HIER JE FIREBASE KEYS
 const firebaseConfig = {
  apiKey: "AIzaSyBeidcBbNTGKb_GtXEad20Xpug1Se9e9x0",
  authDomain: "hotelreception.firebaseapp.com",
 databaseURL: "https://hotelreception-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "hotelreception",
  storageBucket: "hotelreception.firebasestorage.app",
  messagingSenderId: "162982201655",
  appId: "1:162982201655:web:e7730850e09d3670d032b2"
};


firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// kamers genereren
const roomsDiv = document.getElementById("rooms");

for(let i=1;i<=20;i++){
    let div=document.createElement("div");
    div.className="room free";
    div.id="room"+i;
    div.innerHTML=`
        <h3>Room ${i}</h3>
        <p class="info">Free</p>
        <button onclick="checkIn(${i})">Check In</button>
        <button onclick="checkOut(${i})">Check Out</button>
    `;
    roomsDiv.appendChild(div);
}

// realtime sync
db.ref("rooms").on("value", snap=>{
    let data=snap.val();
    if(!data) return;

    for(let room in data){
        updateRoomUI(room,data[room]);
    }
});

// CHECK IN (FIXED)
function checkIn(room){

    let nameInput=document.getElementById("name").value || "";
    let nightsInput=document.getElementById("nights").value || "";
    let personsInput=document.getElementById("persons").value || "";
    let priceInput=document.getElementById("price").value || "";

    let name=nameInput.trim();
    let nights=nightsInput.trim();
    let persons=personsInput.trim();
    let price=priceInput.trim();

    if(!name || !nights || !persons || !price){
        alert("Fill all fields!");
        return;
    }

    db.ref("rooms/"+room).set({
        name:name,
        nights:nights,
        persons:persons,
        price:price
    });

    clearInputs();
}

// CHECK OUT
function checkOut(room){
    db.ref("rooms/"+room).remove();
}

// UI UPDATE
function updateRoomUI(room,data){
    let div=document.getElementById("room"+room);
    div.classList.remove("free");
    div.classList.add("busy");

    div.querySelector(".info").innerHTML=
        `<b>${data.name}</b><br>
        Nights: ${data.nights}<br>
        Persons: ${data.persons}<br>
        € ${data.price}`;
}

// INPUT RESET
function clearInputs(){
    document.getElementById("name").value="";
    document.getElementById("nights").value="";
    document.getElementById("persons").value="";
    document.getElementById("price").value="";
}
</script>

</body>
</html>
