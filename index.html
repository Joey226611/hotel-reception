<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hotel Reception</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}
.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    padding:20px;
}
.room{
    background:#1e293b;
    padding:15px;
    border-radius:15px;
}
.free{ background:#065f46; }
.busy{ background:#7f1d1d; }

input{
    padding:6px;
    margin:3px;
    border-radius:6px;
    border:none;
    width:90%;
}
button{
    padding:7px;
    margin-top:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>Hotel Reception</h1>
<div class="grid" id="rooms"></div>

<script>
// 🔥 FIREBASE CONFIG
 const firebaseConfig = {
  apiKey: "AIzaSyBeidcBbNTGKb_GtXEad20Xpug1Se9e9x0",
  authDomain: "hotelreception.firebaseapp.com",
 databaseURL: "https://hotelreception-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "hotelreception",
  storageBucket: "hotelreception.firebasestorage.app",
  messagingSenderId: "162982201655",
  appId: "1:162982201655:web:e7730850e09d3670d032b2"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

const roomNumbers=[101,102,103,104,105,106,107,108,109,201,202,203,204];
const roomsDiv=document.getElementById("rooms");

// 💰 prijs systeem
function getRoomPrice(room){
    if(room>=101 && room<=104) return 300;
    if(room==105) return 400;
    if(room>=106 && room<=109) return 300;
    if(room>=201 && room<=204) return 600;
}

// kamers maken
roomNumbers.forEach(room=>{
    let price=getRoomPrice(room);

    let div=document.createElement("div");
    div.className="room free";
    div.id="room"+room;
    div.innerHTML=`
        <h3>Room ${room}</h3>
        <p class="info">Free<br>€${price} p.p / night</p>

        <input id="name${room}" placeholder="Guest name">
        <input id="nights${room}" placeholder="Nights">
        <input id="persons${room}" placeholder="Persons">

        <button onclick="checkIn(${room})">Check In</button>
        <button onclick="checkOut(${room})">Check Out</button>
    `;
    roomsDiv.appendChild(div);
});

// realtime sync
db.ref("rooms").on("value", snap=>{
    let data=snap.val();
    if(!data) return;
    for(let room in data){
        updateRoomUI(room,data[room]);
    }
});

// CHECK IN
function checkIn(room){
    let name=(document.getElementById("name"+room).value||"").trim();
    let nights=parseInt(document.getElementById("nights"+room).value||0);
    let persons=parseInt(document.getElementById("persons"+room).value||0);

    if(!name || nights<=0 || persons<=0){
        alert("Fill all fields!");
        return;
    }

    let total=persons*nights*getRoomPrice(room);

    db.ref("rooms/"+room).set({
        name:name,
        nights:nights,
        persons:persons,
        total:total
    });
}

// CHECK OUT
function checkOut(room){
    db.ref("rooms/"+room).remove();
    location.reload();
}

// UI update wanneer kamer bezet is
function updateRoomUI(room,data){
    let div=document.getElementById("room"+room);
    div.classList.remove("free");
    div.classList.add("busy");

    let price=getRoomPrice(room);

    div.querySelector(".info").innerHTML=
        `<b>${data.name}</b><br>
        Persons: ${data.persons}<br>
        Nights: ${data.nights}<br>
        Price p.p: €${price}<br>
        <b>Total €${data.total}</b>`;
}
</script>

</body>
</html>
