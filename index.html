<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Luxury Hotel Reception</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(180deg,#020617,#0f172a);
    color:#fff;
}

/* HEADER */
header{
    text-align:center;
    padding:25px;
    font-size:28px;
    font-weight:bold;
    color:#fcd34d;
    letter-spacing:2px;
    text-shadow:0 0 15px rgba(252,211,77,.6);
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
    padding:25px;
}

/* ROOM CARD */
.room{
    backdrop-filter:blur(12px);
    background:rgba(255,255,255,0.05);
    border-radius:20px;
    padding:18px;
    box-shadow:0 0 25px rgba(0,0,0,.6);
    transition:.3s;
    border-left:6px solid #22c55e;
}
.room:hover{
    transform:translateY(-6px);
    box-shadow:0 0 30px rgba(255,215,0,.35);
}

.room h3{
    margin:0;
    color:#fcd34d;
}

.info{
    margin:8px 0 12px;
    line-height:1.4;
    font-size:14px;
}

/* STATUS COLORS */
.free{border-left:6px solid #22c55e;}
.occupied{border-left:6px solid #ef4444;}
.dirty{border-left:6px solid #ff0000;}
.cleaning{border-left:6px solid #3b82f6;}
.cleaned{border-left:6px solid #f59e0b;}

/* INPUTS */
input{
    width:95%;
    padding:8px;
    margin:4px 0;
    border-radius:10px;
    border:none;
    background:#020617;
    color:#fff;
    border:1px solid rgba(255,215,0,.15);
}

/* BUTTONS */
button{
    width:98%;
    padding:9px;
    margin-top:6px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    background:linear-gradient(90deg,#fcd34d,#d4af37);
    color:#000;
    transition:.2s;
}
button:hover{
    transform:scale(1.03);
    box-shadow:0 0 15px rgba(255,215,0,.5);
}

.receipt{
    background:#020617;
    color:#fcd34d;
    border:1px solid #fcd34d;
}
</style>
</head>

<body>

<header>!!!!We gaan binnenkort van Site veranderen!!!!</header>
<div class="grid" id="rooms"></div>

<!-- Notification sound -->
<audio id="notifSound" src="Notification.mp3" preload="auto"></audio>

<script>
// 🔑 Firebase config
 var firebaseConfig = {
  apiKey: "AIzaSyBeidcBbNTGKb_GtXEad20Xpug1Se9e9x0",
  authDomain: "hotelreception.firebaseapp.com",
 databaseURL: "https://hotelreception-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "hotelreception",
  storageBucket: "hotelreception.firebasestorage.app",
  messagingSenderId: "162982201655",
  appId: "1:162982201655:web:e7730850e09d3670d032b2"
};

firebase.initializeApp(firebaseConfig);
var db=firebase.database();

// Rooms
const rooms=[101,102,103,104,105,106,107,108,109,201,202,203,204];
const grid=document.getElementById("rooms");

// Audio
let notif=document.getElementById("notifSound");
let oldData={};

// Room price
function price(r){
 if(r>=101&&r<=104) return 300;
 if(r==105) return 400;
 if(r>=106&&r<=109) return 300;
 if(r>=201&&r<=204) return 600;
}

// Create room cards
rooms.forEach(r=>{
 let card=document.createElement("div");
 card.className="room free";
 card.id="room"+r;
 card.innerHTML=`
  <h3>Room ${r}</h3>
  <div class="info">Free<br>€${price(r)} p.p / night</div>
  <input id="name${r}" placeholder="Guest name">
  <input id="nights${r}" placeholder="Nights">
  <input id="persons${r}" placeholder="Persons">

  <button onclick="checkIn(${r})">Check In</button>
  <button onclick="checkOut(${r})">Check Out</button>
  <button onclick="janitorBusy(${r})">Janitor Busy</button>
  <button onclick="cleanDone(${r})">Cleaning Done</button>
  <button onclick="releaseRoom(${r})">Release Room</button>
  <button class="receipt" onclick="receipt(${r})">Print Receipt</button>
 `;
 grid.appendChild(card);
});

// Realtime listener with sound
db.ref("rooms").on("value", snap=>{
 let data=snap.val();
 rooms.forEach(r=>{
    let prevStatus = oldData[r] ? oldData[r].status : null;
    let newStatus = data && data[r] ? data[r].status : null;

    if(prevStatus!==newStatus && prevStatus!==null){
        notif.play().catch(e=>console.log("Audio blocked:", e));
    }

    if(!data || !data[r]) setFree(r);
    else updateRoom(r,data[r]);
 });
 oldData = data || {};
});

// Actions
function checkIn(room){
 let name=(document.getElementById("name"+room).value||"").trim();
 let nights=parseInt(document.getElementById("nights"+room).value||0);
 let persons=parseInt(document.getElementById("persons"+room).value||0);
 if(!name||nights<=0||persons<=0){alert("Fill fields");return;}
 db.ref("rooms/"+room).set({
  name:name,nights:nights,persons:persons,
  total:nights*persons*price(room),
  date:new Date().toLocaleString(),
  status:"occupied"
 });
}

function checkOut(room){db.ref("rooms/"+room+"/status").set("dirty");}
function janitorBusy(room){db.ref("rooms/"+room+"/status").set("cleaning");}
function cleanDone(room){db.ref("rooms/"+room+"/status").set("cleaned");}
function releaseRoom(room){db.ref("rooms/"+room).remove();}

// UI updates
function setFree(room){
 let div=document.getElementById("room"+room);
 div.className="room free";
 div.querySelector(".info").innerHTML=`Free<br>€${price(room)} p.p / night`;
}

function updateRoom(room,data){
 let div=document.getElementById("room"+room);
 if(data.status=="occupied"){
  div.className="room occupied";
  div.querySelector(".info").innerHTML=
  `<b>${data.name}</b><br>Persons:${data.persons}<br>Nights:${data.nights}<br>Total €${data.total}`;
 }
 if(data.status=="dirty"){div.className="room dirty";div.querySelector(".info").innerHTML="<b>Needs Cleaning</b>";}
 if(data.status=="cleaning"){div.className="room cleaning";div.querySelector(".info").innerHTML="<b>Janitor Busy</b>";}
 if(data.status=="cleaned"){div.className="room cleaned";div.querySelector(".info").innerHTML="<b>Cleaned ✔</b>";}
}

// Receipt
function receipt(room){
 db.ref("rooms/"+room).once("value").then(s=>{
  if(!s.exists()){alert("Empty");return;}
  let d=s.val();
  let w=window.open("","","width=400,height=600");
  w.document.write(`<h2>Hotel Receipt</h2>
  Room ${room}<hr>
  Name: ${d.name}<br>Persons: ${d.persons}<br>
  Nights: ${d.nights}<br>Price p.p €${price(room)}<br>
  <h3>Total €${d.total}</h3>${d.date}`);
  w.print();
 });
}
</script>

</body>
</html>
